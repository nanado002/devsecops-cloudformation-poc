version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/app/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "github-actions"
      - "security"

  - package-ecosystem: "docker"
    directory: "/app/backend"
    schedule:
      interval: "weekly"
    labels:
      - "docker"
      - "security"

  - package-ecosystem: "docker"
    directory: "/app/frontend"
    schedule:
      interval: "weekly"
    labels:
      - "docker"
      - "security"
