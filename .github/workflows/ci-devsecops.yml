name: DevSecOps CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-and-build:
    name: Security Gates and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.27.2/gitleaks_8.27.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          ./gitleaks detect --source . --redact --no-git

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/backend/requirements.txt
          pip install pytest bandit pip-audit

      - name: Run tests
        env:
          SECRET_KEY: ${{ secrets.APP_SECRET_KEY || 'ci-test-key-not-for-production' }}
          PYTHONPATH: ${{ github.workspace }}/app/backend
        run: pytest tests -v

      - name: SAST with Bandit
        run: bandit -r app/backend -ll

      - name: SCA with pip-audit
        run: pip-audit -r app/backend/requirements.txt

      - name: SAST with Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/python p/docker p/github-actions p/kubernetes p/secrets

      - name: Install CloudFormation lint and Checkov
        run: pip install cfn-lint checkov

      - name: Validate CloudFormation with cfn-lint
        run: cfn-lint cloudformation/*.yml

      - name: IaC scan with Checkov
        run: |
          checkov -d . --quiet \
            --skip-check CKV_AWS_18,CKV_AWS_136,CKV_AWS_158,CKV_AWS_149,CKV_K8S_43,CKV_K8S_40,CKV_K8S_153,CKV_GHA_7,CKV_K8S_35

      - name: Build backend Docker image
        run: docker build -t devsecops-poc-backend:${{ github.sha }} app/backend

      - name: Build frontend Docker image
        run: docker build -t devsecops-poc-frontend:${{ github.sha }} app/frontend

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-poc-backend:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-poc-frontend:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  dast:
    name: DAST Baseline
    runs-on: ubuntu-latest
    needs: security-and-build
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env for docker compose
        run: |
          echo "SECRET_KEY=${{ secrets.APP_SECRET_KEY || 'ci-dast-key-not-for-production' }}" > .env
          echo "GF_ADMIN_USER=admin" >> .env
          echo "GF_ADMIN_PASSWORD=${{ secrets.GF_ADMIN_PASSWORD || 'ci-grafana-pw' }}" >> .env

      - name: Build images
        run: docker compose build

      - name: Start app
        run: docker compose up -d

      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:8080 >/dev/null; then exit 0; fi
            sleep 3
          done
          docker compose logs frontend
          exit 1

      - name: Wait for backend metrics
        run: |
          for i in {1..30}; do
            curl -s http://localhost:5000/health >/dev/null || true
            if curl -s http://localhost:5000/metrics | grep -q "secure_app_http_requests_total"; then exit 0; fi
            sleep 2
          done
          exit 1

      - name: Verify Prometheus is ready
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:9090/-/ready; then exit 0; fi
            sleep 2
          done
          echo "=== Prometheus failed to start. Logs: ==="
          docker compose logs prometheus
          exit 1

      - name: Verify Grafana is healthy
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:3000/api/health | grep -q '"database": "ok"'; then exit 0; fi
            sleep 2
          done
          exit 1

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8080"
          fail_action: false

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "=== prometheus ==="
          docker compose logs prometheus
          echo "=== backend ==="
          docker compose logs backend

      - name: Tear down
        if: always()
        run: docker compose down -v

  deploy-eks:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [security-and-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.EKS_CLUSTER_NAME != '' && vars.AWS_REGION != ''
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          BACKEND_REPO: ${{ vars.BACKEND_ECR_REPO }}
        run: |
          docker build -t $ECR_REGISTRY/$BACKEND_REPO:${{ github.sha }} app/backend
          docker push $ECR_REGISTRY/$BACKEND_REPO:${{ github.sha }}

      - name: Build and push frontend image to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          FRONTEND_REPO: ${{ vars.FRONTEND_ECR_REPO }}
        run: |
          docker build -t $ECR_REGISTRY/$FRONTEND_REPO:${{ github.sha }} app/frontend
          docker push $ECR_REGISTRY/$FRONTEND_REPO:${{ github.sha }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ vars.AWS_REGION }} \
            --name ${{ vars.EKS_CLUSTER_NAME }}

      - name: Apply namespace, RBAC, and network policy
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/serviceaccount-rbac.yml
          kubectl apply -f k8s/networkpolicy.yml

      - name: Create app secrets in EKS
        env:
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
        run: |
          kubectl create secret generic app-secrets \
            --from-literal=SECRET_KEY="${APP_SECRET_KEY:-default-change-me}" \
            --namespace devsecops-poc \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy backend to EKS
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          BACKEND_REPO: ${{ vars.BACKEND_ECR_REPO }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed "s|devsecops-poc-backend:local|$ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG|g" \
            k8s/backend-deployment.yml | kubectl apply -f -

      - name: Deploy frontend to EKS
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          FRONTEND_REPO: ${{ vars.FRONTEND_ECR_REPO }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed "s|devsecops-poc-frontend:local|$ECR_REGISTRY/$FRONTEND_REPO:$IMAGE_TAG|g" \
            k8s/frontend-deployment.yml | kubectl apply -f -

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/backend -n devsecops-poc --timeout=300s
          kubectl rollout status deployment/frontend -n devsecops-poc --timeout=300s

      - name: Show deployed pod status
        if: always()
        run: |
          kubectl get pods -n devsecops-poc -o wide
          echo "--- backend describe ---"
          kubectl describe pods -n devsecops-poc -l app=backend | tail -60
          echo "--- backend logs ---"
          kubectl logs -n devsecops-poc -l app=backend --tail=40 || true
