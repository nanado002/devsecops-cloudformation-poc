title = "DevSecOps PoC Gitleaks Configuration"

[extend]
useDefault = true

[[rules]]
id = "generic-api-key-assignment"
description = "Generic API key assignment"
regex = '''(?i)(api[_-]?key|secret|token|password)\s*[:=]\s*["'][A-Za-z0-9_\-]{16,}["']'''
tags = ["key", "secret", "generic"]

[allowlist]
description = "Allow example placeholders only"
regexes = [
  '''YOUR_[A-Z0-9_]+''',
  '''REPLACE_ME''',
  '''example'''
]
