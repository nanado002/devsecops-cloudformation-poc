apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-service-account
  namespace: devsecops-poc
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-read-only-role
  namespace: devsecops-poc
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-read-only-rolebinding
  namespace: devsecops-poc
subjects:
  - kind: ServiceAccount
    name: app-service-account
    namespace: devsecops-poc
roleRef:
  kind: Role
  name: app-read-only-role
  apiGroup: rbac.authorization.k8s.io
