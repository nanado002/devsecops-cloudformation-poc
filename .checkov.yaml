# Checkov configuration for DevSecOps CloudFormation PoC
# Each skip is documented with the reason it is intentionally not remediated.
skip-check:
  - CKV_AWS_18    # S3 access logging: no logging bucket provisioned in PoC scope
  - CKV_AWS_136   # ECR KMS CMK: AWS-managed AES256 sufficient; KMS key not in PoC scope
  - CKV_AWS_158   # CloudWatch KMS: same rationale as CKV_AWS_136
  - CKV_AWS_149   # Secrets Manager KMS CMK: default aws/secretsmanager key is sufficient
  - CKV_K8S_43    # Image digest: CI substitutes commit-SHA tags via sed; Trivy gates CVEs
  - CKV_K8S_40    # High UID: runAsNonRoot enforced; specific UID policy not required here
  - CKV_K8S_153   # nginx configuration-snippet: annotation removed from ingress.yml
  - CKV_GHA_7     # workflow_dispatch inputs: required for parameterized manual CFN deploy
